<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon: Distinctive "N" Mark -->
  <g transform="translate(6, 18)">
    <rect x="4" y="4" width="80" height="80" rx="20" fill="url(#brandGrad)" opacity="0.12"/>
    <rect x="8" y="6" width="8" height="76" rx="4" fill="url(#brandGrad)"/>
    <path d="M20 10 L72 78" stroke="url(#brandGrad)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <rect x="64" y="6" width="8" height="76" rx="4" fill="url(#brandGrad)"/>
    <circle cx="76" cy="10" r="6" fill="url(#accentGrad)" filter="url(#glow)"/>
    <circle cx="76" cy="10" r="2.5" fill="white" opacity="0.85"/>
    <circle cx="8" cy="6" r="3" fill="url(#accentGrad)" opacity="0.5"/>
    <circle cx="8" cy="82" r="3" fill="url(#accentGrad)" opacity="0.5"/>
    <circle cx="64" cy="82" r="3" fill="url(#accentGrad)" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(108, 24)">
    <text x="0" y="42" font-family="'Inter','Space Grotesk','Segoe UI',sans-serif" font-size="44" font-weight="700" letter-spacing="-0.5" fill="white">Nexify</text>
    <circle cx="185" cy="14" r="4.5" fill="url(#accentGrad)" filter="url(#glow)"/>
    <text x="0" y="68" font-family="'Inter','Segoe UI',sans-serif" font-size="12" font-weight="500" letter-spacing="4" fill="#A1A1AA">TECHNOLOGIES</text>
    <text x="0" y="85" font-family="'Inter','Segoe UI',sans-serif" font-size="8" font-weight="400" letter-spacing="2" fill="#52525B">AI-NATIVE SOFTWARE COMPANY</text>
  </g>
</svg>
