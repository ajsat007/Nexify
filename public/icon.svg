<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square backdrop -->
  <rect x="10" y="10" width="180" height="180" rx="44" fill="url(#brandGrad)"/>

  <!-- Distinctive "N" Mark -->
  <g transform="translate(48, 38)">
    <!-- Left stem -->
    <rect x="8" y="8" width="16" height="108" rx="7" fill="white"/>

    <!-- Diagonal — makes it clearly N -->
    <path d="M26 10 L94 114" stroke="white" stroke-width="14" stroke-linecap="round" fill="none"/>

    <!-- Right stem -->
    <rect x="78" y="8" width="16" height="108" rx="7" fill="white"/>

    <!-- AI accent node top-right -->
    <circle cx="94" cy="12" r="10" fill="#22D3EE" filter="url(#glow)"/>
    <circle cx="94" cy="12" r="4" fill="white" opacity="0.9"/>

    <!-- Neural dots -->
    <circle cx="12" cy="12" r="4" fill="rgba(255,255,255,0.3)"/>
    <circle cx="12" cy="112" r="4" fill="rgba(255,255,255,0.3)"/>
    <circle cx="86" cy="112" r="4" fill="rgba(255,255,255,0.3)"/>
  </g>
</svg>
