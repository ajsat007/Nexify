<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0A2E"/>
      <stop offset="50%" stop-color="#13113C"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/><line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Aurora -->
  <ellipse cx="300" cy="315" rx="350" ry="280" fill="rgba(99,102,241,0.08)" filter="blur(80px)"/>
  <ellipse cx="900" cy="315" rx="300" ry="250" fill="rgba(6,182,212,0.06)" filter="blur(80px)"/>

  <!-- N Mark (scaled, centered left) -->
  <g transform="translate(100, 160) scale(1.6)">
    <rect x="4" y="4" width="80" height="80" rx="20" fill="url(#brandGrad)" opacity="0.16"/>
    <rect x="8" y="6" width="8" height="76" rx="4" fill="url(#brandGrad)"/>
    <path d="M20 10 L72 78" stroke="url(#brandGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <rect x="64" y="6" width="8" height="76" rx="4" fill="url(#brandGrad)"/>
    <circle cx="76" cy="10" r="6" fill="url(#accentGrad)" filter="url(#glow)"/>
    <circle cx="76" cy="10" r="2.5" fill="white" opacity="0.85"/>
    <circle cx="8" cy="6" r="2" fill="url(#accentGrad)" opacity="0.5"/>
    <circle cx="8" cy="82" r="2" fill="url(#accentGrad)" opacity="0.5"/>
    <circle cx="64" cy="82" r="2" fill="url(#accentGrad)" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(260, 245)">
    <text x="0" y="46" font-family="'Inter','Space Grotesk','Segoe UI',sans-serif" font-size="46" font-weight="700" letter-spacing="-0.5" fill="white">Nexify</text>
    <circle cx="195" cy="15" r="5" fill="url(#accentGrad)" filter="url(#glow)"/>
    <text x="0" y="74" font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="500" letter-spacing="4" fill="#A1A1AA">TECHNOLOGIES</text>
    <text x="0" y="96" font-family="'Inter','Segoe UI',sans-serif" font-size="10" font-weight="400" letter-spacing="2" fill="#52525B">AI-NATIVE SOFTWARE COMPANY</text>
  </g>
</svg>
