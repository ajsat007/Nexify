<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- === Icon: Distinctive "N" Mark (clearly an N, never an M) === -->
  <g transform="translate(6, 18)">
    <!-- Subtle glow backdrop -->
    <rect x="4" y="4" width="80" height="80" rx="20" fill="url(#brandGrad)" opacity="0.08"/>

    <!-- Left stem -->
    <rect x="8" y="6" width="8" height="76" rx="4" fill="url(#brandGrad)"/>

    <!-- Diagonal: top-left to bottom-right — this makes it clearly an N -->
    <path d="M20 10 L72 78" stroke="url(#brandGrad)" stroke-width="7" stroke-linecap="round" fill="none"/>

    <!-- Right stem -->
    <rect x="64" y="6" width="8" height="76" rx="4" fill="url(#brandGrad)"/>

    <!-- AI accent node on top-right -->
    <circle cx="76" cy="10" r="6" fill="url(#accentGrad)" filter="url(#glow)"/>
    <!-- White center dot -->
    <circle cx="76" cy="10" r="2.5" fill="white" opacity="0.85"/>

    <!-- Left node (data in) -->
    <circle cx="8" cy="6" r="3" fill="url(#accentGrad)" opacity="0.5"/>
    <!-- Bottom-left node -->
    <circle cx="8" cy="82" r="3" fill="url(#accentGrad)" opacity="0.5"/>
    <!-- Bottom-right node -->
    <circle cx="64" cy="82" r="3" fill="url(#accentGrad)" opacity="0.5"/>
  </g>

  <!-- === Wordmark === -->
  <g transform="translate(108, 24)">
    <!-- Nexify — bold, forward, tech-native -->
    <text x="0" y="42" font-family="'Inter','Space Grotesk','Segoe UI',sans-serif" font-size="44" font-weight="700" letter-spacing="-0.5" fill="#0F172A">Nexify</text>

    <!-- Dot on "i" — matches accent -->
    <circle cx="185" cy="14" r="4.5" fill="url(#accentGrad)" filter="url(#glow)"/>

    <!-- Technologies — clean, uppercase, spaced -->
    <text x="0" y="68" font-family="'Inter','Segoe UI',sans-serif" font-size="12" font-weight="500" letter-spacing="4" fill="#64748B">TECHNOLOGIES</text>

    <!-- Tagline — subtle, AI-native positioning -->
    <text x="0" y="85" font-family="'Inter','Segoe UI',sans-serif" font-size="8" font-weight="400" letter-spacing="2" fill="#94A3B8">AI-NATIVE SOFTWARE COMPANY</text>
  </g>
</svg>
