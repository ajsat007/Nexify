<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Brand gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="70%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- === Icon Mark: Futuristic "N" with neural/flow motif === -->
  <g transform="translate(10, 18)">
    <!-- Outer hexagon/sheld -->
    <rect x="2" y="2" width="80" height="80" rx="20" fill="url(#brandGrad)" opacity="0.12"/>
    <rect x="2" y="2" width="80" height="80" rx="20" fill="none" stroke="url(#brandGrad)" stroke-width="1.5" opacity="0.3"/>

    <!-- Neural N: flowing lines forming N -->
    <!-- Left stem -->
    <path d="M22 68V16L42 36L62 16V68" fill="none" stroke="url(#brandGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right stem overlay (gradient split) -->
    <path d="M22 68V16" fill="none" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

    <!-- Neural connection dots -->
    <circle cx="42" cy="42" r="4" fill="url(#accentGrad)" filter="url(#glow)"/>
    <circle cx="28" cy="28" r="2.5" fill="white" opacity="0.5"/>
    <circle cx="56" cy="28" r="2.5" fill="white" opacity="0.5"/>
    <circle cx="28" cy="56" r="2.5" fill="white" opacity="0.5"/>
    <circle cx="56" cy="56" r="2.5" fill="white" opacity="0.5"/>

    <!-- AI circuit traces -->
    <path d="M28 28 L42 42 L56 28" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
    <path d="M28 56 L42 42 L56 56" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
  </g>

  <!-- === Wordmark === -->
  <g transform="translate(108, 22)">
    <!-- Nexify -->
    <text x="0" y="42" font-family="'Space Grotesk','Inter','Segoe UI',sans-serif" font-size="44" font-weight="700" letter-spacing="-0.5" fill="#0F172A">
      Nexify
    </text>

    <!-- Stylized dot on i -->
    <circle cx="195" cy="14" r="4.5" fill="url(#accentGrad)" filter="url(#glow)"/>

    <!-- Technologies -->
    <text x="0" y="68" font-family="'Inter','Segoe UI',sans-serif" font-size="12" font-weight="500" letter-spacing="4" fill="#64748B" text-transform="uppercase">
      TECHNOLOGIES
    </text>

    <!-- Tagline -->
    <text x="0" y="84" font-family="'Inter','Segoe UI',sans-serif" font-size="8" font-weight="400" letter-spacing="1.8" fill="#94A3B8" text-transform="uppercase">
      ENGINEERING TOMORROW'S DIGITAL FRONTIERS
    </text>
  </g>
</svg>
